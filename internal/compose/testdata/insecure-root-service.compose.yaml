networks:
  app_net: {}

services:
  app:
    image: nginx:1.25
    user: root
    read_only: true
    networks:
      - app_net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
    init: true
    stop_signal: SIGTERM
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "true"]
